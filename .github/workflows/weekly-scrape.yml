name: Weekly TED Scraper Run

on:
  # Jeden Sonntag um 06:00 UTC
  schedule:
    - cron: '0 6 * * 0'

  # Manuell auslösbar über GitHub UI (Actions Tab -> Run workflow)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Max 2 Stunden

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install beautifulsoup4 python-dotenv

      - name: Create data directories
        run: |
          mkdir -p data/raw/details
          mkdir -p data/raw/fulltext
          mkdir -p data/filtered
          mkdir -p data/export/archive
          mkdir -p data/export/test

      - name: Restore enrichment cache
        # Der Cache spart ~99% der AI-Kosten bei Re-Runs
        uses: actions/cache@v4
        with:
          path: |
            data/.enrichment_log.json
            data/.award_match_log.json
            data/.last_run.json
            data/.checkpoint.json
            data/raw/details/
          key: ted-cache-${{ github.run_number }}
          restore-keys: |
            ted-cache-

      - name: Run scraper pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python main.py --all --two-stage 2>&1 | tee data/pipeline_run.log

      - name: Copy latest Excel with fixed name
        run: |
          # Find the newest Excel in data/export/
          LATEST=$(ls -t data/export/*.xlsx 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" data/export/TED_Defence_Trailers_LATEST.xlsx
            echo "Latest Excel: $LATEST"
            echo "Copied to: data/export/TED_Defence_Trailers_LATEST.xlsx"
          else
            echo "ERROR: No Excel file found in data/export/"
            exit 1
          fi

      - name: Commit and push updated Excel
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/export/TED_Defence_Trailers_LATEST.xlsx

          # Nur committen wenn sich was geändert hat
          if git diff --staged --quiet; then
            echo "No changes to Excel -- skipping commit"
          else
            git commit -m "Weekly scraper update $(date +'%Y-%m-%d')

            Automated run via GitHub Actions.
            See pipeline log in Actions tab for details."
            git push
          fi

      - name: Upload pipeline log as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: data/pipeline_run.log
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Scraper Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/export/TED_Defence_Trailers_LATEST.xlsx ]; then
            SIZE=$(du -h data/export/TED_Defence_Trailers_LATEST.xlsx | cut -f1)
            echo "Excel exported: $SIZE" >> $GITHUB_STEP_SUMMARY
          else
            echo "No Excel generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          # Show last 20 lines of pipeline log
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -20 data/pipeline_run.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No log available"
          echo '```' >> $GITHUB_STEP_SUMMARY
