# =============================================================================
# TED Defence Trailer Scraper – Configuration
# =============================================================================

# --- TED API Settings ---
api:
  base_url: "https://api.ted.europa.eu/v3"
  # Alternative: Public search endpoint (no key required)
  search_url: "https://api.ted.europa.eu/v3/notices/search"
  detail_url: "https://api.ted.europa.eu/v3/notices"

  # Rate limiting
  requests_per_second: 1  # conservative to avoid 429 rate limits
  max_retries: 3
  retry_backoff_factor: 2  # exponential: 2s, 4s, 8s
  timeout_seconds: 30

  # Pagination
  page_size: 250  # API max is 250
  max_results_per_query: 15000  # API limit for PAGE_NUMBER mode

# --- Search Scope ---
search:
  # Date range (ISO format)
  date_from: "2015-01-01"
  date_to: "2026-04-13"

  # Search scope: ALL = alle Bekanntmachungen
  scope: "ALL"

  # Only latest versions of each notice
  latest_only: true

# --- CPV Codes (Stufe 1 – API-Filter) ---
# Grouped by relevance tier
cpv_codes:
  # Tier 1: Directly trailer/anhänger related
  tier1_trailer_direct:
    - "34223000"  # Anhänger und Sattelanhänger
    - "34223100"  # Sattelanhänger
    - "34223200"  # Tank semi-trailers
    - "34223300"  # Anhänger
    - "34223310"  # Universalanhänger
    - "34223370"  # Kippanhänger
  # Tier 2: Military vehicles & defence
  tier2_defence_vehicles:
    - "35600000"  # Militärfahrzeuge und zugehörige Teile
    - "35610000"  # Militärfahrzeuge
    # Note: 35612000 is not a valid CPV in TED API
    - "35000000"  # Sicherheits-/Verteidigungsausrüstung (breit)
  # Tier 3: Transport & heavy vehicles (broad catch)
  tier3_transport_broad:
    - "34100000"  # Kraftfahrzeuge
    - "34130000"  # Kraftfahrzeuge für den Gütertransport
    - "34140000"  # Schwerlastfahrzeuge
    - "34144000"  # Kraftfahrzeuge für besondere Zwecke
    - "34950000"  # Beladesysteme (Loading Systems)

# --- Legal Basis Filter (Defence-Richtlinie) ---
legal_basis:
  # Strong defence signal – prioritize these
  defence_directive: "32009L0081"  # Richtlinie 2009/81/EG (Verteidigung)
  # Also include general procurement (trailers may be procured under this)
  general_directives:
    - "32014L0024"  # Richtlinie 2014/24/EU (Öffentliche Aufträge)
    - "32014L0025"  # Richtlinie 2014/25/EU (Versorgungssektoren)

