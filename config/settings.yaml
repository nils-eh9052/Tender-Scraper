# --- False Positive Blacklist (Opus QA Sprint 6, 2026-04-28) ---
# Notices matching these terms where trailers are only accessories will be filtered
blacklist_terms:
  # Vehicles where trailers are accessories, not the primary procurement
  vehicle_accessories:
    - "garden machinery"
    - "robotic mowers"
    - "quad bikes"
    - "motorcycles only"
    - "ATVs only"
    - "all-terrain vehicles"
    - "mowers"
    - "mini tractors"
    - "hedge trimmers"
    - "utility terrain vehicle"
    - "UTV"

# --- Relevance Scoring ---
scoring:
  # Points per match type
  weights:
    cpv_tier1_match: 30       # Direct trailer CPV
    cpv_tier2_match: 20       # Defence vehicle CPV
    cpv_tier3_match: 5        # Broad transport CPV
    defence_directive: 25     # Procured under 2009/81/EG
    keyword_category_match: 15  # Specific trailer category keyword
    keyword_generic_trailer: 5  # Generic "trailer" mention
    defence_context_word: 10   # Military/defence keyword
    title_match_bonus: 10     # Keyword found in title (not just description)
  # Minimum score to be considered relevant
  threshold_relevant: 25
  threshold_high_confidence: 50

# --- Output ---
output:
  raw_dir: "data/raw"
  filtered_dir: "data/filtered"
  export_dir: "data/export"
  checkpoint_file: "data/.checkpoint.json"

  # Excel export settings
  excel_filename: "ted_defence_trailers_{date}.xlsx"
  excel_sheets:
    - name: "All Results"
      description: "Alle relevanten Ausschreibungen"
    - name: "High Confidence"
      description: "Score >= 50"
